
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanças</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface2: #222222;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #c8f55a;
      --accent-dim: rgba(200,245,90,0.12);
      --danger: #ff5f57;
      --danger-dim: rgba(255,95,87,0.12);
      --success: #4caf7d;
      --success-dim: rgba(76,175,125,0.12);
      --warning: #ffb347;
      --warning-dim: rgba(255,179,71,0.12);
      --radius: 10px;
      --radius-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
    .app { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-logo { padding: 0 1.25rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .sidebar-logo h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; color: var(--accent); }
    .sidebar-logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sidebar-section { padding: 0 1rem; margin-bottom: 1.5rem; }
    .sidebar-section label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: block; margin-bottom: 6px; padding: 0 0.25rem; }
    .month-nav { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .month-nav button { background: none; border: none; color: var(--muted); padding: 7px 10px; cursor: pointer; font-size: 16px; transition: color 0.15s; }
    .month-nav button:hover { color: var(--text); }
    .month-nav .month-label { flex: 1; text-align: center; font-size: 13px; font-weight: 500; }
    .view-tabs { display: flex; flex-direction: column; gap: 2px; }
    .tab-btn { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; border: none; background: none; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; text-align: left; width: 100%; transition: all 0.15s; }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
    .tab-btn .icon { font-size: 16px; width: 20px; text-align: center; }
    .fb-indicator { margin-top: auto; padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .fb-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; flex-shrink: 0; transition: background 0.3s; }
    .fb-dot.ok { background: var(--success); }
    .fb-dot.err { background: var(--danger); }
    .fb-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* MAIN */
    .main { flex: 1; padding: 2rem; max-width: 960px; overflow-x: hidden; }
    .page { display: none; }
    .page.active { display: block; }

    /* SUMMARY */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .s-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; }
    .s-card .s-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .s-card .s-value { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
    .s-card .s-value.red { color: var(--danger); }
    .s-card .s-value.green { color: var(--success); }
    .s-card .s-value.yellow { color: var(--accent); }
    .s-card .s-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ACTION BAR */
    .action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 12px; flex-wrap: wrap; }
    .action-bar h2 { font-size: 16px; font-weight: 500; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); color: #111; border-color: transparent; font-weight: 600; }
    .btn.primary:hover { background: #d4ff6a; }
    .btn.danger-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* TABLE */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); text-align: left; font-weight: 500; }
    thead th.right { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    td { padding: 9px 16px; font-size: 14px; vertical-align: middle; }
    td.right { text-align: right; }
    .cat-name { display: flex; align-items: center; gap: 10px; }
    .cat-pill { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .custom-tag { font-size: 9px; padding: 1px 6px; border-radius: 99px; background: rgba(91,156,246,0.12); color: #5b9cf6; border: 1px solid rgba(91,156,246,0.2); font-weight: 600; letter-spacing: 0.4px; }
    .fixed-tag { font-size: 9px; padding: 1px 6px; border-radius: 99px; background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(255,179,71,0.25); font-weight: 600; }
    .value-input { font-family: 'DM Mono', monospace; font-size: 14px; background: transparent; border: 1px solid transparent; color: var(--text); width: 120px; text-align: right; padding: 4px 6px; border-radius: 6px; transition: all 0.15s; }
    .value-input:hover { border-color: var(--border2); }
    .value-input:focus { outline: none; border-color: var(--accent); background: var(--surface2); }
    .value-input::placeholder { color: #444; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-bg { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; min-width: 60px; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .bar-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); min-width: 36px; text-align: right; }
    tfoot td { padding: 12px 16px; background: var(--surface2); border-top: 1px solid var(--border2); font-weight: 600; }
    tfoot td.mono { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 15px; }

    .del-row-btn { width: 22px; height: 22px; border-radius: 5px; border: 1px solid transparent; background: none; color: #555; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .del-row-btn:hover { background: var(--danger-dim); color: var(--danger); border-color: rgba(255,95,87,0.3); }

    /* botões de ação por linha */
    .row-actions { display: flex; align-items: center; gap: 4px; }
    .action-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; color: var(--muted); }
    .action-btn:hover { background: var(--surface); color: var(--text); border-color: rgba(255,255,255,0.2); }
    /* pago */
    .action-btn.pago { color: var(--success); border-color: rgba(76,175,125,0.45); background: var(--success-dim); }
    .action-btn.pago:hover { background: rgba(76,175,125,0.22); }
    /* fixar valor */
    .action-btn.pinned { color: var(--warning); border-color: rgba(255,179,71,0.45); background: var(--warning-dim); }
    .action-btn.pinned:hover { background: rgba(255,179,71,0.22); }
    /* linha paga */
    tr.row-pago td { opacity: 0.45; }
    tr.row-pago td:first-child { opacity: 1; }
    tr.row-pago .row-paid-badge { display: inline-flex; }
    .row-paid-badge { display: none; font-size: 9px; padding: 1px 7px; border-radius: 99px; background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,125,0.3); font-weight: 600; margin-left: 4px; vertical-align: middle; }
    .row-pinned-badge { font-size: 9px; padding: 1px 7px; border-radius: 99px; background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(255,179,71,0.3); font-weight: 600; margin-left: 4px; vertical-align: middle; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.75rem; width: 100%; max-width: 440px; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 0.4rem; }
    .modal .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; transition: border-color 0.15s; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .field select option { background: #222; }

    /* Toggle option cards */
    .toggle-options { display: flex; gap: 8px; margin-top: 4px; }
    .toggle-opt { flex: 1; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; text-align: center; transition: all 0.15s; }
    .toggle-opt:hover { border-color: var(--border2); background: var(--surface); }
    .toggle-opt.selected { border-color: var(--accent); background: var(--accent-dim); }
    .toggle-opt .opt-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .toggle-opt .opt-label { font-size: 12px; font-weight: 500; color: var(--text); }
    .toggle-opt .opt-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }

    /* months chips preview */
    .months-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-top: 8px; }
    .months-preview-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .months-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .month-chip { font-size: 11px; padding: 2px 9px; border-radius: 99px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,245,90,0.2); }
    .fixed-info-box { background: var(--surface2); border: 1px solid rgba(255,179,71,0.25); border-radius: var(--radius); padding: 10px 14px; margin-top: 8px; font-size: 12px; color: var(--warning); line-height: 1.6; }

    /* PARCELAS */
    .installments-list { display: flex; flex-direction: column; gap: 10px; }
    .inst-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.15s; }
    .inst-card:hover { border-color: var(--border2); }
    .inst-info { flex: 1; }
    .inst-name { font-weight: 500; font-size: 15px; }
    .inst-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .inst-progress { width: 120px; }
    .inst-progress .prog-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .inst-value { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 15px; white-space: nowrap; }
    .inst-actions { display: flex; gap: 6px; }

    /* HISTÓRICO */
    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; cursor: pointer; transition: all 0.15s; }
    .hist-card:hover { border-color: var(--accent); }
    .hist-card.current { border-color: var(--accent); background: var(--accent-dim); }
    .hist-month { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .hist-total { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--accent); }
    .hist-count { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* CONFIG */
    .config-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .config-section h3 { font-size: 11px; font-weight: 500; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
    .config-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .config-row:last-child { border-bottom: none; }
    .config-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 6px 10px; width: 200px; transition: border-color 0.15s; }
    .config-input:focus { outline: none; border-color: var(--accent); }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    .tag.soon { background: rgba(91,156,246,0.15); color: #5b9cf6; }

    /* TOAST */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 16px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { border-color: var(--success); color: var(--success); }
    .toast.err { border-color: var(--danger); color: var(--danger); }
    .toast.warn { border-color: var(--warning); color: var(--warning); }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
    .empty p { font-size: 14px; }

    /* VENCIMENTO */
    .venc-input { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); width: 44px; text-align: center; padding: 3px 6px; border-radius: 6px; transition: all 0.15s; }
    .venc-input:hover { border-color: rgba(255,255,255,0.25); }
    .venc-input:focus { outline: none; border-color: var(--accent); background: #2a2a2a; }
    .venc-input::placeholder { color: #555; font-weight: 400; font-size: 11px; }
    .venc-suffix { font-size: 10px; color: var(--muted); }

    /* BUSCA E ORDENAÇÃO */
    .table-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 160px; }
    .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 12px 7px 32px; transition: border-color 0.15s; }
    .search-wrap input:focus { outline: none; border-color: var(--accent); }
    .search-wrap input::placeholder { color: #555; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #555; font-size: 13px; pointer-events: none; }
    .sort-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .sort-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sort-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); font-weight: 600; }

    /* CARDS MOBILE — usados em telas pequenas no lugar da tabela */
    .cat-cards { display: none; flex-direction: column; gap: 8px; }
    .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; transition: border-color 0.15s; }
    .cat-card.card-pago { border-color: rgba(76,175,125,0.3); background: rgba(76,175,125,0.04); }
    .cat-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .cat-card-name { font-size: 14px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-card-body { display: flex; align-items: center; gap: 8px; }
    .cat-card-input { font-family: 'DM Mono', monospace; font-size: 14px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); flex: 1; min-width: 0; text-align: right; padding: 6px 10px; border-radius: 8px; transition: all 0.15s; }
    .cat-card-input:focus { outline: none; border-color: var(--accent); }
    .cat-card-venc { display: flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 8px; }
    .cat-card-venc span { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .cat-card-venc input { font-family: 'DM Mono', monospace; font-size: 13px; background: transparent; border: none; color: var(--text); width: 30px; text-align: center; padding: 0; }
    .cat-card-venc input:focus { outline: none; color: var(--accent); }
    .cat-card-actions { display: flex; gap: 4px; }

    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; flex-direction: row; flex-wrap: wrap; padding: 0.75rem 1rem; gap: 8px; }
      .sidebar-logo { padding: 0; border: none; margin: 0; flex: 1; }
      .sidebar-logo p { display: none; }
      .sidebar-section { padding: 0; margin: 0; }
      .sidebar-section label { display: none; }
      .view-tabs { flex-direction: row; }
      .tab-btn { padding: 6px 10px; font-size: 13px; }
      .tab-btn .icon { display: none; }
      .fb-indicator { display: none; }
      .main { padding: 0.75rem; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      /* esconde tabela, mostra cards */
      .table-wrap { display: none; }
      .cat-cards { display: flex; }
